<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArthSaathi - Authenticate</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #F8F9FE 0%, #E0E7FF 100%);
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--text-main);
        }
        .logo-box {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4F46E5, #818CF8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 20px;
        }
        .auth-tabs {
            display: flex;
            background: #F3F4F6;
            padding: 4px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s;
        }
        .tab.active {
            background: white;
            color: var(--accent-purple);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--charcoal);
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: var(--accent-purple);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }
        .auth-btn:hover {
            background: #6366F1;
            transform: translateY(-2px);
        }
        .auth-footer {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 600;
        }
        .social-auth {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <div class="logo-box">A</div>
            <span>ArthSaathi</span>
        </div>

        <div class="auth-tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <div id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button class="auth-btn" onclick="handleAuth()">Sign In</button>
        </div>

        <div id="signup-form" style="display: none;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button class="auth-btn" onclick="handleAuth()">Create Account</button>
        </div>


        <div class="auth-footer">
            <p id="footer-text">Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up</a></p>
        </div>
        <!-- Google Translate Element -->
        <div id="google_translate_element" style="margin-top: 20px;"></div>
    </div>

    <script>
        let currentTab = 'login';

        function switchTab(type) {
            currentTab = type;
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const tabs = document.querySelectorAll('.tab');
            const footerText = document.getElementById('footer-text');

            if (type === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                footerText.innerHTML = `Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up</a>`;
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
                footerText.innerHTML = `Already have an account? <a href="#" onclick="switchTab('login')">Login</a>`;
            }
        }

        async function handleAuth() {
            const endpoint = currentTab === 'login' ? '/api/login' : '/api/signup';
            let payload = {};

            if (currentTab === 'login') {
                payload = {
                    email: document.querySelector('#login-form input[type="email"]').value,
                    password: document.querySelector('#login-form input[type="password"]').value
                };
            } else {
                payload = {
                    name: document.querySelector('#signup-form input[type="text"]').value,
                    email: document.querySelector('#signup-form input[type="email"]').value,
                    password: document.querySelector('#signup-form input[type="password"]').value
                };
            }

            if (!payload.email || !payload.password) {
                alert("Please fill in all fields.");
                return;
            }

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    if (currentTab === 'signup') {
                        alert("Account created successfully! Please login.");
                        switchTab('login');
                    } else {
                        localStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = '/dashboard';
                    }
                } else {
                    alert(data.detail || "Authentication failed");
                }
            } catch (error) {
                console.error("Auth error:", error);
                alert("An error occurred during authentication.");
            }
        }
    </script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
